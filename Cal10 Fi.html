<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Calculator</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  padding:20px;
}
h2 { margin-bottom:15px; color:#333; }
.container { max-width:1000px; margin:auto; }
.two-column {
  display: flex;
  gap:60px;
  flex-wrap: wrap;
  position: relative;
}
.two-column::before {
  content:"";
  position:absolute;
  top:10px;
  bottom:10px;
  left:50%;
  width:2px;
  background:#ccc;
  transform: translateX(-50%);
  z-index:0;
}
.column {
  flex:1;
  min-width:400px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
  position:relative;
  z-index:1;
}
.row { margin-bottom:15px; }
label { display:block; font-weight:bold; margin-bottom:6px; }
input[type="text"],
input[type="number"] {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}
input[type="text"]:focus,
input[type="number"]:focus {
  outline:none;
  border-color:#007bff;
  box-shadow:0 0 5px rgba(0,123,255,0.3);
}
.result {
  font-size:20px;
  font-weight:bold;
  color:#0a7d2c;
  transition: all 0.2s ease;
}
.highlight {
  background:#d4edda;
  padding:5px;
  border-radius:6px;
}
.shortcut button {
  margin:3px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#007bff;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}
.shortcut button:hover { background:#0056b3; }
.active-shortcut { outline:2px solid #0a7d2c; }
.reset-btn {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#dc3545;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}
.reset-btn:hover { background:#b02a37; }
.top-prices {
  display:flex;
  gap:20px;
  margin-bottom:20px;
}
.top-prices .price-box { flex:1; }
.top-prices label { font-weight:bold; margin-bottom:4px; display:block; }
</style>
</head>
<body>

<div class="container">

<h2>ราคาทองคำแท่งวันนี้</h2>

<div class="top-prices">
  <div class="price-box">
    <label>รับซื้อ</label>
    <input type="number" id="gold_buy" step="0.01" placeholder="0.00" oninput="updateBuySell()">
  </div>
  <div class="price-box">
    <label>ขายออก</label>
    <input type="number" id="gold_sell" step="0.01" placeholder="0.00" oninput="updateBuySell()">
  </div>
</div>

<div class="two-column">

  <!-- ลูกค้าซื้อทอง -->
  <div class="column" id="buySection">
    <h2>ลูกค้าซื้อทอง</h2>

    <div class="row">
      <label>1. ราคาทองคำแท่ง (ดึงจากขายออก)</label>
      <input type="number" id="price" step="0.01" oninput="calc()">
    </div>

    <div class="row">
      <label>2. เลือกน้ำหนัก</label>
      <div class="shortcut" id="shortcutBox">
        <button onclick="setWeight(8,1,this)">ครึ่งสลึง</button>
        <button onclick="setWeight(4,1,this)">หนึ่งสลึง</button>
        <button onclick="setWeight(2,1,this)">สองสลึง</button>
        <button onclick="setWeight(4,3,this)">สามสลึง</button>
        <button onclick="setWeight(1,1,this)">หนึ่งบาท</button>
        <button onclick="setWeight(1,1.5,this)">หกสลึง</button>
        <button onclick="setWeight(1,2,this)">สองบาท</button>
        <button onclick="setWeight(1,3,this)">สามบาท</button>
        <button onclick="setWeight(1,4,this)">สี่บาท</button>
        <button onclick="setWeight(1,5,this)">ห้าบาท</button>
      </div>
    </div>

    <div class="row">
      <label>3. ค่ากำเหน็จ</label>
      <input type="number" id="fee" step="0.01" oninput="calc()">
    </div>

    <div class="row">
      <label>4. P</label>
      <input type="number" id="profit" step="0.01" oninput="calc()">
    </div>

    <div class="row">
      <label>น้ำหนักเกิน (กรัม)</label>
      <input type="number" id="overWeight" step="0.01" oninput="calc()">
    </div>

    <div class="row">
      <label>น้ำหนักเกิน =</label>
      <div class="result" id="overResult">+0.00</div>
    </div>

    <div class="row">
      <label>5. ราคาร้านขายออก</label>
      <div class="result" id="total">0.00</div>
    </div>

    <button class="reset-btn" onclick="resetAll()">Reset ล้างค่า</button>
  </div>

  <!-- ลูกค้าขายทอง -->
  <div class="column" id="sellSection">
    <h2>ลูกค้าขายทอง</h2>

    <div class="row">
      <label>ราคาทองคำแท่ง (ดึงจาก รับซื้อ)</label>
      <input type="number" id="sell_price" step="0.01" oninput="calcSell()">
    </div>

    <div class="row">
      <label>2. ค่าหลอม (%)</label>
      <input type="number" id="sell_percent" step="0.01" value="0" oninput="calcSell()">
      <div class="result" id="sell_percent_result">0.00</div>
    </div>

    <div class="row">
      <label>3. ค่าคูณพิเศษ</label>
      <div class="result">(ระบบคำนวณอัตโนมัติ)</div>
    </div>

    <div class="row">
      <label>4. น้ำหนักทอง</label>
      <input type="number" id="sell_weight" step="0.01" oninput="calcSell()">
    </div>

    <div class="row">
      <label>5. P</label>
      <input type="number" id="sell_profit" step="0.01" oninput="calcSell()">
    </div>

    <div class="row">
      <label>ผลรวมลูกค้าขายทอง</label>
      <div class="result" id="sell_total">0.00</div>
    </div>

    <button class="reset-btn" onclick="resetSell()">Reset ล้างค่า</button>
  </div>

</div>

<script>
let weight = 1;
let multiplier = 1;

// ดึงราคาจาก รับซื้อ/ขายออก ให้ลูกค้า
function updateBuySell(){
  let buy = parseFloat(document.getElementById('gold_buy').value) || 0;
  let sell = parseFloat(document.getElementById('gold_sell').value) || 0;

  // ลูกค้าซื้อทอง
  document.getElementById('price').value = sell || 0;
  calc();

  // ลูกค้าขายทอง
  document.getElementById('sell_price').value = buy || 0;
  calcSell();
}

function format(num){
  return num.toLocaleString('th-TH',{ minimumFractionDigits:2, maximumFractionDigits:2 });
}

function parseInput(val){ return parseFloat((val||'').toString().replace(/,/g,'')) || 0; }

function calc(){
  let price = parseInput(document.getElementById('price').value);
  let fee = parseInput(document.getElementById('fee').value);
  let profit = parseInput(document.getElementById('profit').value);

  let base = weight !== 0 ? price / weight : 0;
  base = base * multiplier;

  let overWeight = parseFloat(document.getElementById('overWeight').value) || 0;
  let overPrice = price * 0.0656 * overWeight;

  document.getElementById('overResult').innerText = '+' + format(overPrice);

  let total = base + fee + profit + overPrice;

  let totalEl = document.getElementById('total');
  totalEl.innerText = format(total);
  totalEl.classList.remove('highlight');
  void totalEl.offsetWidth;
  totalEl.classList.add('highlight');
}

function setWeight(w, multi, btn){
  weight = w;
  multiplier = multi;
  document.querySelectorAll('#shortcutBox button').forEach(b=>b.classList.remove('active-shortcut'));
  btn.classList.add('active-shortcut');
  calc();
}

function resetAll(){
  document.querySelectorAll('#buySection input').forEach(i => i.value = '');
  document.getElementById('total').innerText = '0.00';
  document.getElementById('overResult').innerText = '+0.00';
  weight = 1;
  multiplier = 1;
  document.querySelectorAll('#shortcutBox button').forEach(b=>b.classList.remove('active-shortcut'));
}

function calcSell(){
  let price = parseInput(document.getElementById('sell_price').value);
  let percent = parseFloat(document.getElementById('sell_percent').value) || 0;
  let weightSell = parseFloat(document.getElementById('sell_weight').value) || 0;
  let profit = parseInput(document.getElementById('sell_profit').value);

  // คำนวณค่าหลอม = price * percent%, ปัดขึ้นหลัก 10
  let meltRaw = price * (percent/100);
  let melt = Math.ceil(meltRaw/10)*10; // ปัดขึ้นหลัก 10
  document.getElementById('sell_percent_result').innerText = format(melt);

  let base = (price - melt) * 0.0656;
  let total = (base * weightSell) - profit;

  document.getElementById('sell_total').innerText = format(total);
}

function resetSell(){
  document.querySelectorAll('#sellSection input').forEach(i => i.value = '');
  document.getElementById('sell_total').innerText='0.00';
  document.getElementById('sell_percent_result').innerText='0.00';
}
</script>

</body>
</html>
